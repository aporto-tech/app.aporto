global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ---- Alertmanager connection ----
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ---- Alert rules ----
rule_files:
  - /etc/prometheus/alert_rules.yml

# ---- Scrape targets ----
scrape_configs:
  # Nginx Prometheus Exporter
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          service: 'newapi'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
