groups:
  - name: newapi_alerts
    rules:
      # ---- Nginx недоступен ----
      - alert: NginxDown
        expr: nginx_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Nginx Proxy недоступен"
          description: "Nginx reverse proxy перед New API не отвечает."

      # ---- New API недоступен (0 запросов за 3 минуты) ----
      - alert: ServiceDown
        expr: |
          rate(nginx_http_requests_total[3m]) == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "🔴 New API: Нет запросов"
          description: "0 запросов за последние 3 минуты. Возможно, сервис упал."

      # ---- Слишком много активных соединений ----
      - alert: HighConnectionCount
        expr: nginx_connections_active > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ New API: Много активных соединений"
          description: "Активных соединений: {{ $value }}. Возможна перегрузка."

      # ---- Nginx exporter недоступен ----
      - alert: ExporterDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Nginx Exporter недоступен"
          description: "Prometheus не может собрать метрики. Мониторинг не работает."
