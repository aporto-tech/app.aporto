# ============================================
# Standalone Monitoring Stack for New API
# Replicated from Reference Project
# ============================================

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    container_name: aporto-nginx-proxy
    restart: always
    ports:
      - "3004:80"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - aporto-net

  # ---- Nginx Prometheus Exporter ----
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: aporto-nginx-exporter
    restart: always
    command:
      - --nginx.scrape-uri=http://nginx:80/nginx_status
    depends_on:
      - nginx
    networks:
      - aporto-net

  # ---- Prometheus ----
  prometheus:
    image: prom/prometheus:latest
    container_name: aporto-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - aporto-net

  # ---- Alertmanager (Slack alerts) ----
  alertmanager:
    image: prom/alertmanager:latest
    container_name: aporto-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    networks:
      - aporto-net

  # ---- Grafana ----
  grafana:
    image: grafana/grafana:latest
    container_name: aporto-grafana
    restart: always
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - aporto-net

networks:
  aporto-net:
    external: true

volumes:
  prometheus_data:
  grafana_data:
